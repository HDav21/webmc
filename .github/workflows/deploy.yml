name: Vercel Deploy Next
env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: root
  SSH_PASS: ${{ secrets.SSH_PASS }}
  APP_DOCKER_PORT: 8080  # Add your app's Docker port here
on:
  push:
    branches:
      - next
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install Global Dependencies
        run: npm install --global vercel pnpm@9.0.4
      - name: Write Release Info
        run: |
          echo "{\"latestTag\": \"$(git rev-parse --short $GITHUB_SHA)\"}" > assets/release.json
      - name: Create config.local.json
        run: echo '${{ vars.CONFIG }}' > config.local.json
      - name: Build Docker image
        run: docker build -t webmc:latest .
      - name: Save Docker image to tar
        run: docker save webmc:latest -o webmc.tar
      - name: Verify Docker image tar
        run: |
          ls -l webmc.tar
          chmod +r webmc.tar
      - name: Upload Docker image to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASS }}
          port: 22
          source: "./webmc.tar"
          target: "/root/webmc.tar"
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          password: ${{ secrets.SSH_PASS }}
          script: |
            if ! command -v docker &> /dev/null
            then
              echo "Docker not found, installing..."
              apt-get update
              apt-get install -y docker.io
              systemctl start docker
              systemctl enable docker
            else
              echo "Docker is already installed"
            fi

            echo "Loading Docker image..."
            docker load -i /root/webmc.tar

            echo "Stopping existing container (if any)..."
            docker stop webmc || true

            echo "Removing existing 'webmc-previous' container (if any)..."
            docker rm webmc-previous || true

            echo "Renaming current 'webmc' container to 'webmc-previous'..."
            docker rename webmc webmc-previous || true

            echo "Pruning dangling images..."
            docker image prune -f

            echo "Removing old images except 'latest' and 'previous'..."
            docker images webmc --format "{{.Repository}}:{{.Tag}}" | grep -v ":latest$" | grep -v ":previous$" | xargs -r docker rmi -f || true

            echo "Running the new container..."
            docker run -d -p 80:${{ env.APP_DOCKER_PORT }} --name webmc -e PORT=${{ env.APP_DOCKER_PORT }} --restart always webmc:latest

            echo "Deployment completed successfully."
