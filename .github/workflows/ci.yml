name: Start-minecraft
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install
      - run: pnpm build-playground
      # THIS LINE FIXES THE LOADING BAR:
      - run: touch dist/playground/.nojekyll
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/playground
          branch: gh-pages
